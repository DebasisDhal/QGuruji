<div class="page-container">
  <!-- Top header -->
  <header class="header">
    <h1>ABC Clinic</h1>
    <p class="subhead">Take a Token</p>
    <button (click)="onLogin()">Login</button>
  </header>

  <main class="main">
    <div class="card">
      <h2 class="card-title">Generate Token</h2>

      <form [formGroup]="tokenForm">
        <!-- Patient Name -->
        <div class="form-group">
          <label for="patientName">Patient Name</label>
          <input
            id="patientName"
            type="text"
            name="patientName"
            required
            class="form-control"
            formControlName="patientName"
          />
        </div>

        <!-- Mobile Number (India) -->
        <div class="form-group">
          <label for="phone">Mobile Number (India)</label>
          <input
            id="phone"
            type="tel"
            name="phone"
            required
            pattern="^[6-9]\d{9}$"
            placeholder="98XXXXXX01"
            class="form-control"
            formControlName = 'phone'
          />
        </div>

        <!-- Doctor / Service -->
        <div class="form-group">
          <label for="doctorId">Doctor / Service</label>
          <select id="doctorId" name="doctorId" required class="form-control" formControlName="doctorId">
            <option value="">Select doctor / service</option>
            <option value="Dr. Sharma – General Medicine">Dr. Sharma – General Medicine</option>
            <option value="Dr. Patel – Pediatrics">Dr. Patel – Pediatrics</option>
            <option value="Laboratory Test">Laboratory Test</option>
            <option value="Vaccination">Vaccination</option>
          </select>
        </div>

        <!-- Submit button -->
        <button
          type="submit"
         
          class="btn-submit" (click)="onGenerateToken()"
        >
          Generate Token
        </button>
      </form>

      <!-- Token result area -->
      <div *ngIf="showTokenResult" class="token-result">
        <p class="token-number">
          Your Token Number: <strong>T-{{generatedToken}}</strong>
        </p>
        <p class="current-token">
          <!-- Current Token at Clinic: <strong>T-{{currentToken}}</strong> -->
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Scan QR at clinic to take walk‑in token</p>
  </footer>
</div>


<div *ngIf="user$ | async as user">
  <h2>{{ user.Name }}</h2>
  <p>{{ user.Email }}</p>
  <!-- Add your fields here -->
</div>
