<div class="login-container">
  <div class="login-card">
    <h2 class="text-center mb-4">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      
      <!-- Email -->
      <div class="mb-3">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="Enter email">

        <small class="text-danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter password">

        <small class="text-danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password is required
        </small>
      </div>

      <!-- Button -->
      <button class="btn btn-primary w-100" type="submit">
        Login
      </button>

      <!-- Error -->
      <p class="text-danger text-center mt-2" *ngIf="loginError">
        Invalid email or password
      </p>

    </form>
  </div>
</div>
